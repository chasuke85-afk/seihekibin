<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>性癖瓶メーカー - SEIHEKI BIN SHEET</title>
    <style>
        :root { --bg: #fdfbfb; --accent: #ff4d79; --blue: #6366f1; --rule-color: #e63946; --guide-blue: #4361ee; --light-gray: #f2f2f2; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input[type="text"], input[type="number"], textarea { -webkit-user-select: text; user-select: text; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; padding: 10px; outline: none; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 0; color: #444; margin: 0; }
        
        .main-title { font-size: 1.4rem; font-weight: bold; margin: 20px 0 10px; letter-spacing: 2px; color: #333; }
        
        /* カテゴリタブ */
        .category-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 10px 22px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; cursor: pointer; background: #eee; color: #888; transition: 0.3s; }
        .tab.active { background: #333; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .box-common { width: 94%; max-width: 500px; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); background: white; border: 1px solid #f0f0f0; }
        .box-title { font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 15px; display: block; color: #333; }

        /* 瓶選択エリアのボタン類 */
        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .custom-input { flex: 1; border: 2px solid var(--light-gray); }
        .add-btn { background: #333; color: white; border: none; border-radius: 10px; padding: 0 18px; font-weight: bold; cursor: pointer; }
        
        .tool-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-tool { padding: 10px; border-radius: 10px; border: none; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-clear { background: #fef2f2; color: #ef4444; }
        .btn-random { background: #f0f7ff; color: var(--guide-blue); }

        .preset-scroll { max-height: 350px; overflow-y: auto; padding: 10px; background: #fafafa; border-radius: 12px; border: 1px solid #eee; }
        .major-title { font-size: 0.85rem; font-weight: bold; color: #333; background: #eee; padding: 6px 12px; margin: 15px 0 10px 0; border-radius: 6px; display: block; }
        .middle-label { font-size: 0.75rem; font-weight: bold; color: #777; margin: 12px 0 6px 4px; border-left: 3px solid var(--accent); padding-left: 8px; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { font-size: 0.75rem; padding: 7px 14px; border-radius: 20px; background: #fff; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .chip.selected { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 3px 8px rgba(255, 77, 121, 0.3); }

        /* 瓶のデザイン */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 96%; max-width: 800px; padding-bottom: 30px; }
        .bottle-card { background: white; border-radius: 24px; padding: 20px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid #f5f5f5; }
        .bottle-name-edit { width: 90%; font-size: 0.9rem; font-weight: bold; text-align: center; margin-bottom: 10px; border: 1px dashed #ddd; background: #fff; padding: 5px; color: #333; }
        
        .side-tag-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .side-tag { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; background: #f0f0f0; color: #999; cursor: pointer; font-weight: bold; }
        .side-tag.active { background: #333; color: white; }

        .bottle-frame { width: 70px; height: 110px; border: 3px solid #333; border-radius: 5px 5px 25px 25px; margin: 15px auto; position: relative; overflow: hidden; background: #f8f8f8; box-shadow: inset 0 5px 10px rgba(0,0,0,0.05); }
        .liquid { position: absolute; bottom: 0; width: 100%; transition: height 0.2s ease-out; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .p-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #f5f5f5; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .percent-input { width: 55px; text-align: center; border: 1px solid #eee; background: #fff; padding: 6px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; background: #fff; color: #ccc; border-radius: 50%; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }

        /* フッター固定アクション */
        .footer-actions { width: 94%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; margin: 30px 0 50px; }
        .btn-main { height: 55px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-black { background: #333; color: white; }
        .btn-outline { background: white; color: var(--guide-blue); border: 2px solid var(--guide-blue); }
        .btn-accent { background: var(--accent); color: white; }
        .btn-main:active { transform: scale(0.98); }

        /* モーダル */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 30px; padding: 30px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="setupView" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="main-title">性癖瓶メーカー</div>

        <div class="category-tabs">
            <div class="tab active" onclick="selectCategory('2D', this)">2D / 二次元</div>
            <div class="tab" onclick="selectCategory('REAL', this)">REAL / 現実</div>
        </div>

        <div class="box-common">
            <span class="box-title">🍾 瓶を選ぶ (<span id="countDisplay" style="color:var(--accent)">0</span>/20)</span>
            
            <div class="input-row">
                <input type="text" id="customInput" class="custom-input" placeholder="自由に入力して追加...">
                <button onclick="addCustomItem()" class="add-btn">追加</button>
            </div>

            <div class="tool-btns">
                <button class="btn-tool btn-clear" onclick="handleClearClick()">🗑️ 全解除</button>
                <button class="btn-tool btn-random" onclick="randomSelect()">🎲 ランダム20個</button>
            </div>

            <div class="preset-scroll" id="presetScrollArea"></div>
        </div>

        <div class="box-common" style="background: #f8fafc; border-color: #e2e8f0; padding: 15px;">
            <div style="font-size: 0.8rem; line-height: 1.6; color: #64748b; font-weight: bold; text-align: center;">
                瓶をタップして選択、色と量を調整して完成！<br>
                <span style="color:var(--rule-color); cursor:pointer; text-decoration:underline;" onclick="toggleModal(true)">色のルールを確認する</span>
            </div>
        </div>

        <div class="container" id="bottleContainer"></div>

        <div class="footer-actions">
            <button class="btn-main btn-black" onclick="generatePreview()">✨ 完成プレビューを表示</button>
            <button class="btn-main btn-outline" onclick="copyQuestionURL()">🎁 出題用URLをコピー（空瓶/タグ保持）</button>
            <button class="btn-main btn-accent" onclick="copyFullDataURL()">🔗 答え合わせ用URLをコピー</button>
        </div>
    </div>

    <div id="previewArea" style="display:none; width:100%; flex-direction:column; align-items:center; background:#f0f0f0; padding-bottom:50px;">
        <div class="preview-content" id="previewTarget" style="margin-top:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <div id="previewCategoryLabel" style="text-align:center; font-size:0.7rem; font-weight:bold; color:var(--accent); margin-bottom:5px;">2D / 二次元</div>
            <div class="main-title" style="text-align:center; margin:0 0 20px 0;">SEIHEKI BIN SHEET</div>
            <div class="preview-container" id="previewContainer" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;"></div>
        </div>
        <button class="btn-main btn-black" onclick="document.getElementById('previewArea').style.display='none'" style="margin-top:30px; width:200px;">編集に戻る</button>
    </div>

    <div class="modal-overlay" id="ruleModal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--rule-color); margin-top:0;">性癖瓶の注ぎ方</h3>
            <div style="text-align:left; font-size:0.85rem; line-height:1.8; color:#555; margin-bottom:20px;">
                <p>💗 <b>ピンク</b>：好き・性癖・ポジティブ</p>
                <p>💙 <b>ブルー</b>：苦手・地雷・ネガティブ</p>
                <p>📏 <b>量</b>：100%に近いほど感情が強い！</p>
                <p>🏷️ <b>タグ</b>：アクション系では「自分側」「相手側」などの属性を指定できます。</p>
            </div>
            <button class="btn-main btn-black" style="width:100%;" onclick="toggleModal(false)">わかった！</button>
        </div>
    </div>

    <script>
        const STRUCTURED_DATA = [
            { major: "① 属性・フェチパーツ", middles: [{ label: "身体", items: ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす'] },{ label: "髪型", items: ['ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し'] },{ label: "性格・性質", items: ['ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前'] }] },
            { major: "② 服装・装飾", middles: [{ label: "衣装", items: ['制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ'] },{ label: "下着", items: ['可愛い下着','子供っぽい下着','ガーターベルト'] },{ label: "装飾", items: ['メガネ','チョーカー'] }] },
            { major: "③ シチュエーション・関係性", middles: [{ label: "関係", items: ['幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存'] },{ label: "状況", items: ['密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','開拓','敬語'] }] },
            { major: "④ こだわりフェチ", middles: [{ label: "要素", items: ['ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶'] }] },
            { major: "⑤ アクション・プレイ（★タグあり）", taggable: true, middles: [{ label: "愛撫・交流", items: ['キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり'] },{ label: "攻防・プレイ", items: ['指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'] }] }
        ];

        const COLORS = { pink: '#ff5d8f', blue: '#6366f1' };
        let selectedItems = [];
        let pressTimer = null;
        const ALL_PRESETS = STRUCTURED_DATA.flatMap(m => m.middles.flatMap(mid => mid.items));

        function init() {
            const scrollArea = document.getElementById('presetScrollArea');
            STRUCTURED_DATA.forEach(majorGroup => {
                const title = document.createElement('span'); title.className = 'major-title'; title.innerText = majorGroup.major; scrollArea.appendChild(title);
                majorGroup.middles.forEach(mid => {
                    const lab = document.createElement('div'); lab.className = 'middle-label'; lab.innerText = mid.label; scrollArea.appendChild(lab);
                    const gp = document.createElement('div'); gp.className = 'preset-group';
                    mid.items.forEach(name => {
                        const chip = document.createElement('div'); chip.className = 'chip'; chip.innerText = name; chip.id = 'chip-'+name; chip.onclick = () => toggleItem(name, majorGroup.taggable); gp.appendChild(chip);
                    });
                    scrollArea.appendChild(gp);
                });
            });
            loadFromURL(); renderBottles();
        }

        function isTaggableItem(name) {
            return STRUCTURED_DATA.some(m => m.taggable && m.middles.some(mid => mid.items.includes(name)));
        }

        function toggleItem(name, taggable) {
            const idx = selectedItems.findIndex(i => i.name === name);
            if (idx > -1) { selectedItems.splice(idx, 1); document.getElementById('chip-'+name).classList.remove('selected'); }
            else { if(selectedItems.length>=20) return alert("上限20個です"); selectedItems.push({name, color:COLORS.pink, level:0, side:'', isTaggable:!!taggable}); document.getElementById('chip-'+name).classList.add('selected'); }
            renderBottles(); saveState();
        }

        function addCustomItem() {
            const val = document.getElementById('customInput').value.trim();
            if(!val || selectedItems.length>=20) return;
            selectedItems.push({name:val, color:COLORS.pink, level:0, side:'', isTaggable:false});
            document.getElementById('customInput').value=''; renderBottles(); saveState();
        }

        function renderBottles() {
            document.getElementById('countDisplay').innerText = selectedItems.length;
            const container = document.getElementById('bottleContainer'); container.innerHTML = '';
            selectedItems.forEach((b, i) => {
                const card = document.createElement('div'); card.className = 'bottle-card';
                card.innerHTML = `
                    <div class="del-btn" onclick="removeItem(${i})">×</div>
                    ${b.isTaggable ? `<div class="side-tag-container"><div class="side-tag ${b.side==='相手側'?'active':''}" onclick="updateSide(${i},'相手側')">#相手側</div><div class="side-tag ${b.side==='自分側'?'active':''}" onclick="updateSide(${i},'自分側')">#自分側</div></div>`:''}
                    <input type="text" class="bottle-name-edit" value="${b.name}" onchange="selectedItems[${i}].name=this.value;saveState();">
                    <div style="display:flex;justify-content:center;gap:15px;margin-bottom:10px;">
                        <div style="width:22px;height:22px;border-radius:50%;background:${COLORS.pink};border:${b.color===COLORS.pink?'3px solid #333':'none'}" onclick="updateColor(${i},'pink')"></div>
                        <div style="width:22px;height:22px;border-radius:50%;background:${COLORS.blue};border:${b.color===COLORS.blue?'3px solid #333':'none'}" onclick="updateColor(${i},'blue')"></div>
                    </div>
                    <div class="bottle-frame"><div id="liq-${i}" class="liquid" style="height:${b.level}%; background:${b.color}; opacity:0.8;"></div></div>
                    <div class="controls">
                        <button class="p-btn" onmousedown="startPress(${i},-2)" ontouchstart="startPress(${i},-2)" onmouseup="stopPress()" ontouchend="stopPress()">−</button>
                        <input type="number" class="percent-input" id="inp-${i}" value="${b.level}" oninput="updateLevelInput(${i},this.value)">
                        <button class="p-btn" onmousedown="startPress(${i},2)" ontouchstart="startPress(${i},2)" onmouseup="stopPress()" ontouchend="stopPress()">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function generateShortURL(data) {
            const parts = data.map(item => {
                const idx = ALL_PRESETS.indexOf(item.name);
                const namePart = (idx !== -1) ? idx : encodeURIComponent(item.name);
                const isPink = (item.color === COLORS.pink);
                const val = item.level * (isPink ? 1 : -1);
                const sideId = item.side === '相手側' ? 1 : (item.side === '自分側' ? 2 : 0);
                return `${namePart}_${val}_${sideId}`;
            });
            return window.location.origin + window.location.pathname + '?v2=' + parts.join('.');
        }

        function copyFullDataURL() {
            if(selectedItems.length===0) return;
            const url = generateShortURL(selectedItems);
            const text = `【性癖瓶：答え合わせURL】\n私の性癖はこんな感じでした！\n\n${url}\n\n#性癖瓶メーカー`;
            navigator.clipboard.writeText(text).then(()=>alert("答え合わせURLをコピーしました！"));
        }

        function copyQuestionURL() {
            if(selectedItems.length===0) return;
            const qData = selectedItems.map(i => ({...i, level:0, color:COLORS.pink}));
            const url = generateShortURL(qData);
            const text = `【性癖瓶：出題URL】\n私の性癖、当てられるかな？\n\n${url}\n\n#性癖瓶メーカー`;
            navigator.clipboard.writeText(text).then(()=>alert("出題用URLをコピーしました！（タグ保持）"));
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            const v2 = params.get('v2');
            if (v2) {
                selectedItems = v2.split('.').map(p => {
                    const [n, v, s] = p.split('_');
                    const name = isNaN(n) ? decodeURIComponent(n) : ALL_PRESETS[parseInt(n)];
                    return {
                        name, level: Math.abs(parseInt(v)),
                        color: parseInt(v) >= 0 ? COLORS.pink : COLORS.blue,
                        side: s==='1'?'相手側':(s==='2'?'自分側':''),
                        isTaggable: isTaggableItem(name)
                    };
                });
            } else {
                const saved = localStorage.getItem('binMakerData');
                if(saved) selectedItems = JSON.parse(saved);
            }
            selectedItems.forEach(i => document.getElementById('chip-'+i.name)?.classList.add('selected'));
        }

        function updateLevelInput(i,v){ let n=Math.max(0,Math.min(100,parseInt(v)||0)); selectedItems[i].level=n; document.getElementById('liq-'+i).style.height=n+'%'; saveState(); }
        function updateSide(i,s){ selectedItems[i].side=(selectedItems[i].side===s)?'':s; renderBottles(); saveState(); }
        function updateColor(i,t){ selectedItems[i].color=COLORS[t]; renderBottles(); saveState(); }
        function removeItem(i){ const n=selectedItems[i].name; selectedItems.splice(i,1); document.getElementById('chip-'+n)?.classList.remove('selected'); renderBottles(); saveState(); }
        function startPress(i,d){ stopPress(); updateStep(i,d); pressTimer=setInterval(()=>updateStep(i,d),60); }
        function stopPress(){ clearInterval(pressTimer); saveState(); }
        function updateStep(i,d){ if(!selectedItems[i])return; let n=Math.max(0,Math.min(100,selectedItems[i].level+d)); selectedItems[i].level=n; document.getElementById('liq-'+i).style.height=n+'%'; document.getElementById('inp-'+i).value=n; }
        function saveState(){ localStorage.setItem('binMakerData', JSON.stringify(selectedItems)); }
        function toggleModal(s){ document.getElementById('ruleModal').style.display=s?'flex':'none'; }
        function handleClearClick(){ if(confirm("すべての選択を解除しますか？")){ selectedItems=[]; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); renderBottles(); saveState(); } }
        function selectCategory(c,e){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); e.classList.add('active'); }

        function randomSelect() {
            selectedItems=[]; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
            [...ALL_PRESETS].sort(()=>.5-Math.random()).slice(0,20).forEach(n=>{
                selectedItems.push({name:n, color:COLORS.pink, level:0, side:'', isTaggable:isTaggableItem(n)});
                document.getElementById('chip-'+n)?.classList.add('selected');
            });
            renderBottles(); saveState();
        }

        function generatePreview() {
            const p = document.getElementById('previewContainer'); p.innerHTML='';
            selectedItems.forEach(b => {
                const card = document.createElement('div'); card.className='preview-bottle-card';
                card.innerHTML=`<div style="font-size:0.75rem;font-weight:bold;height:3em;">${b.side?'#'+b.side+'<br>':''}${b.name}</div><div class="bottle-frame" style="width:45px;height:75px;margin:10px auto;"><div class="liquid" style="height:${b.level}%;background:${b.color};opacity:0.8;"></div></div><div style="font-size:0.65rem;">${b.level}%</div>`;
                p.appendChild(card);
            });
            document.getElementById('previewArea').style.display='flex';
        }
        window.onload = init;
    </script>
</body>
</html>
