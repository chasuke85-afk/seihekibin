<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>性癖瓶メーカー - SEIHEKI BIN SHEET</title>
    <style>
        :root { --bg: #fdfbfb; --accent: #ff4d79; --blue: #6366f1; --rule-color: #e63946; --guide-blue: #4361ee; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input[type="text"], textarea { -webkit-user-select: text; user-select: text; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; padding: 10px; }

        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 0; color: #444; margin: 0; }
        
        .main-title { font-size: 1.4rem; font-weight: bold; margin: 20px 0 10px; letter-spacing: 1px; color: #333; }

        /* カテゴリタブ */
        .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; background: #eee; color: #777; transition: 0.2s; }
        .tab.active { background: #333; color: white; }

        /* ボックス */
        .box-common { width: 94%; max-width: 500px; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: white; }
        .box-title { font-size: 0.9rem; font-weight: bold; text-align: center; margin-bottom: 10px; display: block; }
        .guide-box { border: 2px solid var(--guide-blue); background: #f5f8ff; }

        /* 項目選択（大・中・小 構造） */
        .preset-scroll { max-height: 350px; overflow-y: auto; padding: 5px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .major-title { font-size: 0.85rem; font-weight: bold; color: #333; background: #e0e0e0; padding: 5px 10px; margin: 15px 0 8px 0; border-radius: 4px; display: block; }
        .middle-label { font-size: 0.75rem; font-weight: bold; color: #666; margin: 10px 0 5px 8px; border-left: 3px solid var(--accent); padding-left: 6px; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding-left: 5px; }
        .chip { font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; background: #fff; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .selector-footer { display: flex; justify-content: space-between; margin-top: 10px; }

        /* 瓶エリア */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 96%; max-width: 800px; padding-bottom: 20px; }
        .bottle-card { background: white; border-radius: 18px; padding: 15px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.07); text-align: center; position: relative; border: 1px solid #f0f0f0; }
        .bottle-name-edit { width: 90%; font-size: 0.85rem; font-weight: bold; text-align: center; margin-bottom: 8px; border: 1px dashed #ccc; background: #fff; padding: 4px; }
        
        .side-tag-container { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .side-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #eee; color: #999; cursor: pointer; }
        .side-tag.active { background: #333; color: white; }

        .bottle-frame { width: 65px; height: 100px; border: 3px solid #333; border-radius: 4px 4px 22px 22px; margin: 12px auto; position: relative; overflow: hidden; background: #f0f0f0; }
        .liquid { position: absolute; bottom: 0; width: 100%; transition: height 0.1s linear; }
        .p-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #f0f0f0; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .del-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: #eee; color: #999; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .comment-area { width: 100%; margin-top: 10px; font-size: 0.75rem; height: 45px; resize: none; border: 1px solid #f0f0f0; background: #fafafa; }

        .btn-mini { font-size: 0.7rem; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; background: #666; color: white; }

        #previewArea { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #eee; margin-top: 30px; }
        .preview-content { background: var(--bg); padding: 20px; border-radius: 0; width: 100%; max-width: 900px; }
        .preview-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .preview-bottle-card { background: white; border-radius: 12px; padding: 10px 5px; text-align: center; border: 1px solid #f0f0f0; }
        .preview-side-tag { font-size: 0.6rem; font-weight: bold; margin-bottom: 2px; display: inline-block; padding: 1px 4px; border-radius: 3px; background: #333; color: white; }
        .preview-note { font-size: 0.65rem; color: #666; margin-top: 5px; min-height: 1em; white-space: pre-wrap; line-height: 1.2; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-content { background: white; border-radius: 25px; padding: 25px; width: 100%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>

    <div id="setupView" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="main-title">性癖瓶メーカー</div>

        <div class="category-tabs">
            <div class="tab active" onclick="selectCategory('2D', this)">2D / 二次元</div>
            <div class="tab" onclick="selectCategory('REAL', this)">REAL / 現実</div>
        </div>

        <div class="box-common">
            <span class="box-title">🍾 瓶を選ぶ (<span id="countDisplay" style="color:var(--accent)">0</span>/20)</span>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <input type="text" id="customInput" placeholder="自由入力..." style="flex: 1;">
                <button onclick="addCustomItem()" style="background: #333; color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold;">追加</button>
            </div>

            <div class="preset-scroll" id="presetScrollArea"></div>

            <div class="selector-footer">
                <button class="btn-mini" onclick="clearAllItems()" style="background:#bbb;">全解除</button>
                <button class="btn-mini" onclick="randomSelect()" style="background:var(--guide-blue);">ランダムに20個選ぶ</button>
            </div>
        </div>

        <div class="box-common guide-box">
            <span class="box-title">〜 使い方 〜</span>
            <div style="font-size: 0.8rem; line-height: 1.8; color: var(--guide-blue); font-weight: bold; text-align: center;">
                1. 瓶を最大20個選ぶ（名称変更もOK）<br>
                2. 下の瓶に「色」と「量」を注ぐ<br>
                3. 完成したらスクリーンショットで保存！
            </div>
            <button class="btn-mini" onclick="toggleModal(true)" style="width:100%; margin-top:12px; background:var(--rule-color); height:40px; font-size:0.85rem;">色のルールを見る</button>
        </div>

        <div class="container" id="bottleContainer"></div>

        <div style="width:94%; max-width:500px; display:flex; flex-direction:column; gap:10px; margin: 20px 0;">
            <button onclick="generatePreview()" style="height:50px; background:#333; color:white; border-radius:12px; border:none; font-weight:bold; font-size:1rem; cursor:pointer;">✨ 完成プレビューを表示する</button>
            <button onclick="copyShareURL()" style="height:50px; background:white; color:var(--guide-blue); border:2px solid var(--guide-blue); border-radius:12px; font-weight:bold; font-size:0.9rem; cursor:pointer;">🔗 項目リストだけをURLで共有</button>
            <button onclick="copyFullDataURL()" style="height:50px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; font-size:0.9rem; cursor:pointer;">🎁 全データ（色・量含む）をURLで共有</button>
        </div>
    </div>

    <div id="previewArea" style="display:none;">
        <div style="margin-bottom:15px; color:#666; font-size:0.8rem;">↓このエリアをスクリーンショットして保存↓</div>
        <div class="preview-content" id="previewTarget">
            <div id="previewCategoryLabel" style="text-align:center; font-size:0.7rem; font-weight:bold; color:var(--accent); margin-bottom:5px;">2D / 二次元</div>
            <div class="main-title" style="text-align:center; margin:0 0 20px 0;">SEIHEKI BIN SHEET</div>
            <div class="preview-container" id="previewContainer" style="margin:0 auto;"></div>
        </div>
        <button class="btn-mini" onclick="document.getElementById('previewArea').style.display='none'" style="margin-top:20px; background:#333; padding:10px 20px;">編集に戻る</button>
    </div>

    <div class="modal-overlay" id="ruleModal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--rule-color); margin-top:0;">性癖瓶の注ぎ方</h3>
            <div style="text-align:left; font-size:0.8rem; line-height:1.6; color:#555;">
                <p>● <b>ピンク</b>：好き・性癖・ポジティブ</p>
                <p>● <b>ブルー</b>：苦手・地雷・ネガティブ</p>
                <p>● <b>量</b>：100%に近いほどその感情が強い！</p>
                <p>● <b>タグ</b>：一部項目は #自分側 #相手側 を選べます。</p>
            </div>
            <button class="btn-mini" style="width:100%; height:45px; margin-top:20px; background:#333;" onclick="toggleModal(false)">OK！</button>
        </div>
    </div>

    <script>
        // 大項目・中項目・小項目の完全データ構造
        const STRUCTURED_DATA = [
            {
                major: "① 属性・フェチパーツ",
                middles: [
                    { label: "身体", items: ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす'] },
                    { label: "髪型", items: ['ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し'] },
                    { label: "性格・性質", items: ['ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前'] }
                ]
            },
            {
                major: "② 服装・装飾",
                middles: [
                    { label: "衣装", items: ['制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ'] },
                    { label: "下着", items: ['可愛い下着','子供っぽい下着','ガーターベルト'] },
                    { label: "装飾", items: ['メガネ','チョーカー'] }
                ]
            },
            {
                major: "③ シチュエーション・関係性",
                middles: [
                    { label: "関係", items: ['幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存'] },
                    { label: "状況", items: ['密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','敬語'] }
                ]
            },
            {
                major: "④ こだわりフェチ",
                middles: [
                    { label: "要素", items: ['ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶'] }
                ]
            },
            {
                major: "⑤ アクション・プレイ（★タグあり）",
                taggable: true,
                middles: [
                    { label: "愛撫・交流", items: ['キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり'] },
                    { label: "攻防・プレイ", items: ['指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'] }
                ]
            }
        ];

        const COLORS = { pink: '#ff5d8f', blue: '#6366f1' };
        let selectedItems = [];
        let pressTimer = null;
        let currentCategory = '2D';
        const ALL_PRESETS = STRUCTURED_DATA.flatMap(m => m.middles.flatMap(mid => mid.items));

        function init() {
            const scrollArea = document.getElementById('presetScrollArea');
            STRUCTURED_DATA.forEach(majorGroup => {
                // 大項目のラベル
                const majorTitle = document.createElement('span');
                majorTitle.className = 'major-title';
                majorTitle.innerText = majorGroup.major;
                scrollArea.appendChild(majorTitle);

                majorGroup.middles.forEach(mid => {
                    // 中項目のラベル
                    const midLabel = document.createElement('div');
                    midLabel.className = 'middle-label';
                    midLabel.innerText = mid.label;
                    scrollArea.appendChild(midLabel);

                    // 小項目のグループ
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'preset-group';
                    mid.items.forEach(name => {
                        const chip = document.createElement('div');
                        chip.className = 'chip';
                        chip.innerText = name;
                        chip.id = 'chip-' + name;
                        chip.onclick = () => toggleItem(name, majorGroup.taggable);
                        groupDiv.appendChild(chip);
                    });
                    scrollArea.appendChild(groupDiv);
                });
            });
            loadFromURL();
            loadState();
        }

        function toggleItem(name, isTaggable) {
            const idx = selectedItems.findIndex(i => i.name === name);
            if (idx > -1) {
                selectedItems.splice(idx, 1);
                document.getElementById('chip-' + name)?.classList.remove('selected');
            } else {
                if (selectedItems.length >= 20) return alert("上限20個です！");
                selectedItems.push({ name: name, color: COLORS.pink, level: 50, note: '', side: '', isTaggable: !!isTaggable });
                document.getElementById('chip-' + name)?.classList.add('selected');
            }
            renderBottles();
            saveState();
        }

        function addCustomItem() {
            const val = document.getElementById('customInput').value.trim();
            if (!val) return;
            if (selectedItems.length >= 20) return alert("上限20個です！");
            selectedItems.push({ name: val, color: COLORS.pink, level: 50, note: '', side: '', isTaggable: false });
            document.getElementById('customInput').value = '';
            renderBottles();
            saveState();
        }

        function renderBottles() {
            document.getElementById('countDisplay').innerText = selectedItems.length;
            const container = document.getElementById('bottleContainer');
            container.innerHTML = '';
            selectedItems.forEach((b, i) => {
                const card = document.createElement('div');
                card.className = 'bottle-card';
                let sideTagsHTML = b.isTaggable ? `
                    <div class="side-tag-container">
                        <div class="side-tag ${b.side==='相手側'?'active':''}" onclick="updateSide(${i}, '相手側')">#相手側</div>
                        <div class="side-tag ${b.side==='自分側'?'active':''}" onclick="updateSide(${i}, '自分側')">#自分側</div>
                    </div>` : '';

                card.innerHTML = `
                    <div class="del-btn" onclick="removeItem(${i})">×</div>
                    ${sideTagsHTML}
                    <input type="text" class="bottle-name-edit" value="${b.name}" onchange="updateName(${i}, this.value)">
                    <div style="display:flex; justify-content:center; gap:12px; margin-bottom:5px;">
                        <div style="width:18px;height:18px;border-radius:50%;background:${COLORS.pink};border:${b.color===COLORS.pink?'3px solid #333':'none'}" onclick="updateColor(${i},'pink')"></div>
                        <div style="width:18px;height:18px;border-radius:50%;background:${COLORS.blue};border:${b.color===COLORS.blue?'3px solid #333':'none'}" onclick="updateColor(${i},'blue')"></div>
                    </div>
                    <div class="bottle-frame"><div id="liq-${i}" class="liquid" style="height:${b.level}%; background:${b.color}; opacity:0.8;"></div></div>
                    <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                        <button class="p-btn" onmousedown="startPress(${i},-2)" ontouchstart="startPress(${i},-2)" onmouseup="stopPress()" ontouchend="stopPress()">−</button>
                        <span id="lv-${i}" style="font-size:0.85rem; font-weight:bold; width:35px;">${b.level}%</span>
                        <button class="p-btn" onmousedown="startPress(${i},2)" ontouchstart="startPress(${i},2)" onmouseup="stopPress()" ontouchend="stopPress()">+</button>
                    </div>
                    <textarea class="comment-area" placeholder="解説..." onchange="updateNote(${i}, this.value)">${b.note || ''}</textarea>
                `;
                container.appendChild(card);
            });
        }

        // その他機能（保存、プレビュー、共有等）は以前のコードを維持
        function updateSide(i, side) { selectedItems[i].side = (selectedItems[i].side === side) ? '' : side; renderBottles(); saveState(); }
        function removeItem(i) { const name = selectedItems[i].name; selectedItems.splice(i, 1); document.getElementById('chip-' + name)?.classList.remove('selected'); renderBottles(); saveState(); }
        function updateName(i, v) { selectedItems[i].name = v; saveState(); }
        function updateNote(i, v) { selectedItems[i].note = v; saveState(); }
        function updateColor(i, type) { selectedItems[i].color = COLORS[type]; renderBottles(); saveState(); }
        function startPress(i, dir) { stopPress(); updateStep(i, dir); pressTimer = setInterval(() => updateStep(i, dir), 60); }
        function stopPress() { clearInterval(pressTimer); saveState(); }
        function updateStep(i, dir) { if (!selectedItems[i]) return; let n = selectedItems[i].level + dir; if (n < 0) n = 0; if (n > 100) n = 100; selectedItems[i].level = n; document.getElementById(`liq-${i}`).style.height = n + '%'; document.getElementById(`lv-${i}`).innerText = n + '%'; }
        function saveState() { localStorage.setItem('binMakerData', JSON.stringify(selectedItems)); }
        function loadState() { const saved = localStorage.getItem('binMakerData'); if (saved && selectedItems.length === 0) { selectedItems = JSON.parse(saved); } selectedItems.forEach(item => { document.getElementById('chip-' + item.name)?.classList.add('selected'); }); renderBottles(); }
        function selectCategory(cat, el) { currentCategory = cat; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); document.getElementById('previewCategoryLabel').innerText = cat === '2D' ? '2D / 二次元' : 'REAL / 現実'; }
        function toggleModal(s) { document.getElementById('ruleModal').style.display = s ? 'flex' : 'none'; }
        function clearAllItems() { if(!confirm("全解除しますか？")) return; selectedItems = []; document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected')); renderBottles(); saveState(); }
        
        function generatePreview() {
            if (selectedItems.length === 0) return alert("瓶を選んでください");
            const pContainer = document.getElementById('previewContainer');
            pContainer.innerHTML = '';
            selectedItems.forEach(b => {
                const card = document.createElement('div');
                card.className = 'preview-bottle-card';
                const tag = b.side ? `<div class="preview-side-tag">#${b.side}</div><br>` : '';
                card.innerHTML = `<div style="font-size:0.75rem; font-weight:bold; height:3.3em; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.1;">${tag}${b.name}</div><div class="bottle-frame" style="margin:2px auto; width:45px; height:70px;"><div class="liquid" style="height:${b.level}%; background:${b.color}; opacity:0.8;"></div></div><div style="font-size:0.65rem; font-weight:bold; color:#666;">${b.level}%</div><div class="preview-note">${b.note || ''}</div>`;
                pContainer.appendChild(card);
            });
            document.getElementById('previewArea').style.display = 'flex';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function copyShareURL() {
            const presetIndices = []; const customNames = [];
            selectedItems.forEach(item => { const idx = ALL_PRESETS.indexOf(item.name); if (idx !== -1) presetIndices.push(idx); else customNames.push(item.name); });
            let shortData = presetIndices.join(',');
            if (customNames.length > 0) shortData += '_' + btoa(encodeURIComponent(JSON.stringify(customNames)));
            const url = window.location.origin + window.location.pathname + '?items=' + shortData;
            navigator.clipboard.writeText(url).then(() => alert("URLをコピーしました！"));
        }

        function copyFullDataURL() {
            const fullData = btoa(encodeURIComponent(JSON.stringify(selectedItems)));
            const url = window.location.origin + window.location.pathname + '?data=' + fullData;
            navigator.clipboard.writeText(url).then(() => alert("全データURLをコピーしました！"));
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            const fullData = params.get('data'); const itemsData = params.get('items');
            if (fullData) selectedItems = JSON.parse(decodeURIComponent(atob(fullData)));
            else if (itemsData) {
                const parts = itemsData.split('_');
                if (parts[0]) parts[0].split(',').forEach(idx => {
                    const name = ALL_PRESETS[parseInt(idx)];
                    if (name) {
                        const isTag = STRUCTURED_DATA.find(m => m.middles.some(mid => mid.items.includes(name)))?.taggable;
                        selectedItems.push({ name: name, color: COLORS.pink, level: 0, note: '', side: '', isTaggable: !!isTag });
                    }
                });
            }
        }
        
        function randomSelect() {
            clearAllItems();
            const shuffled = [...ALL_PRESETS].sort(() => 0.5 - Math.random());
            shuffled.slice(0, 20).forEach(name => {
                const isTag = STRUCTURED_DATA.find(m => m.middles.some(mid => mid.items.includes(name)))?.taggable;
                toggleItem(name, isTag);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
