<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>性癖瓶メーカー - SEIHEKI BIN SHEET</title>
    <style>
        :root { --bg: #fdfbfb; --accent: #ff4d79; --blue: #6366f1; --rule-color: #e63946; --guide-blue: #4361ee; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input[type="text"], input[type="number"], textarea { -webkit-user-select: text; user-select: text; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; padding: 10px; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 0; color: #444; margin: 0; }
        .main-title { font-size: 1.4rem; font-weight: bold; margin: 20px 0 10px; letter-spacing: 1px; color: #333; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; background: #eee; color: #777; transition: 0.2s; }
        .tab.active { background: #333; color: white; }
        .box-common { width: 94%; max-width: 500px; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: white; }
        .box-title { font-size: 0.9rem; font-weight: bold; text-align: center; margin-bottom: 10px; display: block; }
        .guide-box { border: 2px solid var(--guide-blue); background: #f5f8ff; }
        .preset-scroll { max-height: 350px; overflow-y: auto; padding: 5px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .major-title { font-size: 0.85rem; font-weight: bold; color: #333; background: #e0e0e0; padding: 5px 10px; margin: 15px 0 8px 0; border-radius: 4px; display: block; }
        .middle-label { font-size: 0.75rem; font-weight: bold; color: #666; margin: 10px 0 5px 8px; border-left: 3px solid var(--accent); padding-left: 6px; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding-left: 5px; }
        .chip { font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; background: #fff; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .selector-footer { display: flex; justify-content: space-between; margin-top: 10px; }
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 96%; max-width: 800px; padding-bottom: 20px; }
        .bottle-card { background: white; border-radius: 18px; padding: 15px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.07); text-align: center; position: relative; border: 1px solid #f0f0f0; }
        .bottle-name-edit { width: 90%; font-size: 0.85rem; font-weight: bold; text-align: center; margin-bottom: 8px; border: 1px dashed #ccc; background: #fff; padding: 4px; }
        .side-tag-container { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .side-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #eee; color: #999; cursor: pointer; }
        .side-tag.active { background: #333; color: white; }
        .bottle-frame { width: 65px; height: 100px; border: 3px solid #333; border-radius: 4px 4px 22px 22px; margin: 12px auto; position: relative; overflow: hidden; background: #f0f0f0; }
        .liquid { position: absolute; bottom: 0; width: 100%; transition: height 0.1s linear; }
        .p-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #f0f0f0; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .percent-input { width: 50px; text-align: center; border: 1px solid #eee; background: #f9f9f9; padding: 4px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .del-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: #eee; color: #999; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .comment-area { width: 100%; margin-top: 10px; font-size: 0.75rem; height: 45px; resize: none; border: 1px solid #f0f0f0; background: #fafafa; }
        .btn-mini { font-size: 0.7rem; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; background: #666; color: white; }
        #previewArea { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #eee; margin-top: 30px; }
        .preview-content { background: var(--bg); padding: 20px; width: 100%; max-width: 900px; }
        .preview-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .preview-bottle-card { background: white; border-radius: 12px; padding: 10px 5px; text-align: center; border: 1px solid #f0f0f0; }
        .preview-side-tag { font-size: 0.6rem; font-weight: bold; margin-bottom: 2px; display: inline-block; padding: 1px 4px; border-radius: 3px; background: #333; color: white; }
        .preview-note { font-size: 0.65rem; color: #666; margin-top: 5px; white-space: pre-wrap; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; border-radius: 25px; padding: 25px; width: 100%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>

    <div id="setupView" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="main-title">性癖瓶メーカー</div>

        <div class="category-tabs">
            <div class="tab active" onclick="selectCategory('2D', this)">2D / 二次元</div>
            <div class="tab" onclick="selectCategory('REAL', this)">REAL / 現実</div>
        </div>

        <div class="box-common">
            <span class="box-title">🍾 瓶を選ぶ (<span id="countDisplay" style="color:var(--accent)">0</span>/20)</span>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <input type="text" id="customInput" placeholder="自由入力...">
                <button onclick="addCustomItem()" style="background: #333; color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold;">追加</button>
            </div>
            <div class="preset-scroll" id="presetScrollArea"></div>
            <div class="selector-footer">
                <button class="btn-mini" onclick="handleClearClick()" style="background:#bbb;">全解除</button>
                <button class="btn-mini" onclick="randomSelect()" style="background:var(--guide-blue);">ランダムに20個選ぶ</button>
            </div>
        </div>

        <div class="box-common guide-box">
            <span class="box-title">〜 使い方 〜</span>
            <div style="font-size: 0.8rem; line-height: 1.8; color: var(--guide-blue); font-weight: bold; text-align: center;">
                1. 瓶を最大20個選ぶ<br>
                2. 「色」と「量」を注ぐ<br>
                3. 完成したら出題・共有URLを発行！
            </div>
            <button class="btn-mini" onclick="toggleModal(true)" style="width:100%; margin-top:12px; background:var(--rule-color); height:40px;">色のルールを見る</button>
        </div>

        <div class="container" id="bottleContainer"></div>

        <div style="width:94%; max-width:500px; display:flex; flex-direction:column; gap:10px; margin: 20px 0;">
            <button onclick="generatePreview()" style="height:50px; background:#333; color:white; border-radius:12px; border:none; font-weight:bold; cursor:pointer;">✨ 完成プレビューを表示する</button>
            <button onclick="copyQuestionURL()" style="height:50px; background:white; color:var(--guide-blue); border:2px solid var(--guide-blue); border-radius:12px; font-weight:bold; cursor:pointer;">🎁 Bさんへの出題用URL（短縮版）</button>
            <button onclick="copyFullDataURL()" style="height:50px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🔗 答え合わせ用URL（短縮版）</button>
        </div>
    </div>

    <div id="previewArea" style="display:none;">
        <div class="preview-content" id="previewTarget">
            <div id="previewCategoryLabel" style="text-align:center; font-size:0.7rem; font-weight:bold; color:var(--accent); margin-bottom:5px;">2D / 二次元</div>
            <div class="main-title" style="text-align:center; margin:0 0 20px 0;">SEIHEKI BIN SHEET</div>
            <div class="preview-container" id="previewContainer"></div>
        </div>
        <button class="btn-mini" onclick="document.getElementById('previewArea').style.display='none'" style="margin-top:20px; background:#333; padding:10px 20px;">編集に戻る</button>
    </div>

    <div class="modal-overlay" id="ruleModal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--rule-color);">性癖瓶の注ぎ方</h3>
            <div style="text-align:left; font-size:0.8rem; line-height:1.6; color:#555;">
                <p>● <b>ピンク</b>：好き・性癖・ポジティブ</p>
                <p>● <b>ブルー</b>：苦手・地雷・ネガティブ</p>
                <p>● <b>量</b>：100%に近いほど感情が強い！</p>
            </div>
            <button class="btn-mini" style="width:100%; height:45px; background:#333;" onclick="toggleModal(false)">OK！</button>
        </div>
    </div>

    <script>
        const STRUCTURED_DATA = [
            { major: "① 属性・フェチパーツ", middles: [{ label: "身体", items: ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす'] },{ label: "髪型", items: ['ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し'] },{ label: "性格・性質", items: ['ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前'] }] },
            { major: "② 服装・装飾", middles: [{ label: "衣装", items: ['制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ'] },{ label: "下着", items: ['可愛い下着','子供っぽい下着','ガーターベルト'] },{ label: "装飾", items: ['メガネ','チョーカー'] }] },
            { major: "③ シチュエーション・関係性", middles: [{ label: "関係", items: ['幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存'] },{ label: "状況", items: ['密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','敬語'] }] },
            { major: "④ こだわりフェチ", middles: [{ label: "要素", items: ['ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶'] }] },
            { major: "⑤ アクション・プレイ（★タグあり）", taggable: true, middles: [{ label: "愛撫・交流", items: ['キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり'] },{ label: "攻防・プレイ", items: ['指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'] }] }
        ];

        const COLORS = { pink: '#ff5d8f', blue: '#6366f1' };
        let selectedItems = [];
        let pressTimer = null;
        const ALL_PRESETS = STRUCTURED_DATA.flatMap(m => m.middles.flatMap(mid => mid.items));

        function init() {
            const scrollArea = document.getElementById('presetScrollArea');
            STRUCTURED_DATA.forEach(majorGroup => {
                const title = document.createElement('span'); title.className = 'major-title'; title.innerText = majorGroup.major; scrollArea.appendChild(title);
                majorGroup.middles.forEach(mid => {
                    const lab = document.createElement('div'); lab.className = 'middle-label'; lab.innerText = mid.label; scrollArea.appendChild(lab);
                    const gp = document.createElement('div'); gp.className = 'preset-group';
                    mid.items.forEach(name => {
                        const chip = document.createElement('div'); chip.className = 'chip'; chip.innerText = name; chip.id = 'chip-'+name; chip.onclick = () => toggleItem(name, majorGroup.taggable); gp.appendChild(chip);
                    });
                    scrollArea.appendChild(gp);
                });
            });
            loadFromURL(); renderBottles();
        }

        function toggleItem(name, taggable) {
            const idx = selectedItems.findIndex(i => i.name === name);
            if (idx > -1) { selectedItems.splice(idx, 1); document.getElementById('chip-'+name).classList.remove('selected'); }
            else { if(selectedItems.length>=20) return alert("上限20個"); selectedItems.push({name, color:COLORS.pink, level:0, note:'', side:'', isTaggable:!!taggable}); document.getElementById('chip-'+name).classList.add('selected'); }
            renderBottles(); saveState();
        }

        function addCustomItem() {
            const val = document.getElementById('customInput').value.trim();
            if(!val || selectedItems.length>=20) return;
            selectedItems.push({name:val, color:COLORS.pink, level:0, note:'', side:'', isTaggable:false});
            document.getElementById('customInput').value=''; renderBottles(); saveState();
        }

        function renderBottles() {
            document.getElementById('countDisplay').innerText = selectedItems.length;
            const container = document.getElementById('bottleContainer'); container.innerHTML = '';
            selectedItems.forEach((b, i) => {
                const card = document.createElement('div'); card.className = 'bottle-card';
                card.innerHTML = `
                    <div class="del-btn" onclick="removeItem(${i})">×</div>
                    ${b.isTaggable ? `<div class="side-tag-container"><div class="side-tag ${b.side==='相手側'?'active':''}" onclick="updateSide(${i},'相手側')">#相手側</div><div class="side-tag ${b.side==='自分側'?'active':''}" onclick="updateSide(${i},'自分側')">#自分側</div></div>`:''}
                    <input type="text" class="bottle-name-edit" value="${b.name}" onchange="selectedItems[${i}].name=this.value;saveState();">
                    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:5px;">
                        <div style="width:18px;height:18px;border-radius:50%;background:${COLORS.pink};border:${b.color===COLORS.pink?'3px solid #333':'none'}" onclick="updateColor(${i},'pink')"></div>
                        <div style="width:18px;height:18px;border-radius:50%;background:${COLORS.blue};border:${b.color===COLORS.blue?'3px solid #333':'none'}" onclick="updateColor(${i},'blue')"></div>
                    </div>
                    <div class="bottle-frame"><div id="liq-${i}" class="liquid" style="height:${b.level}%; background:${b.color}; opacity:0.8;"></div></div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
                        <button class="p-btn" onmousedown="startPress(${i},-2)" ontouchstart="startPress(${i},-2)" onmouseup="stopPress()" ontouchend="stopPress()">−</button>
                        <input type="number" class="percent-input" id="inp-${i}" value="${b.level}" oninput="updateLevelInput(${i},this.value)">
                        <button class="p-btn" onmousedown="startPress(${i},2)" ontouchstart="startPress(${i},2)" onmouseup="stopPress()" ontouchend="stopPress()">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- URL短縮ロジック (v2形式) ---
        function generateShortURL(data) {
            const parts = data.map(item => {
                const idx = ALL_PRESETS.indexOf(item.name);
                const namePart = (idx !== -1) ? idx : encodeURIComponent(item.name);
                const isPink = (item.color === COLORS.pink);
                const val = item.level * (isPink ? 1 : -1);
                const sideId = item.side === '相手側' ? 1 : (item.side === '自分側' ? 2 : 0);
                return `${namePart}_${val}_${sideId}`;
            });
            return window.location.origin + window.location.pathname + '?v2=' + parts.join('.');
        }

        function copyFullDataURL() {
            if(selectedItems.length===0) return;
            navigator.clipboard.writeText(generateShortURL(selectedItems)).then(()=>alert("【答え合わせ用】短縮URLをコピーしました！"));
        }

        function copyQuestionURL() {
            if(selectedItems.length===0) return;
            const qData = selectedItems.map(i => ({...i, level:0, color:COLORS.pink, side:''}));
            navigator.clipboard.writeText(generateShortURL(qData)).then(()=>alert("【出題用】短縮URLをコピーしました！"));
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            const v2 = params.get('v2');
            if (v2) {
                selectedItems = v2.split('.').map(p => {
                    const [n, v, s] = p.split('_');
                    const name = isNaN(n) ? decodeURIComponent(n) : ALL_PRESETS[parseInt(n)];
                    return {
                        name, level: Math.abs(parseInt(v)),
                        color: parseInt(v) >= 0 ? COLORS.pink : COLORS.blue,
                        side: s==='1'?'相手側':(s==='2'?'自分側':''),
                        note:'', isTaggable: STRUCTURED_DATA.some(m=>m.taggable && m.middles.some(mid=>mid.items.includes(name)))
                    };
                });
            } else {
                const saved = localStorage.getItem('binMakerData');
                if(saved) selectedItems = JSON.parse(saved);
            }
            selectedItems.forEach(i => document.getElementById('chip-'+i.name)?.classList.add('selected'));
        }

        function updateLevelInput(i,v){ let n=Math.max(0,Math.min(100,parseInt(v)||0)); selectedItems[i].level=n; document.getElementById('liq-'+i).style.height=n+'%'; saveState(); }
        function updateSide(i,s){ selectedItems[i].side=(selectedItems[i].side===s)?'':s; renderBottles(); saveState(); }
        function updateColor(i,t){ selectedItems[i].color=COLORS[t]; renderBottles(); saveState(); }
        function removeItem(i){ const n=selectedItems[i].name; selectedItems.splice(i,1); document.getElementById('chip-'+n)?.classList.remove('selected'); renderBottles(); saveState(); }
        function startPress(i,d){ stopPress(); updateStep(i,d); pressTimer=setInterval(()=>updateStep(i,d),60); }
        function stopPress(){ clearInterval(pressTimer); saveState(); }
        function updateStep(i,d){ if(!selectedItems[i])return; let n=Math.max(0,Math.min(100,selectedItems[i].level+d)); selectedItems[i].level=n; document.getElementById('liq-'+i).style.height=n+'%'; document.getElementById('inp-'+i).value=n; }
        function saveState(){ localStorage.setItem('binMakerData', JSON.stringify(selectedItems)); }
        function toggleModal(s){ document.getElementById('ruleModal').style.display=s?'flex':'none'; }
        function handleClearClick(){ if(confirm("解除?")){ selectedItems=[]; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); renderBottles(); saveState(); } }
        function selectCategory(c,e){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); e.classList.add('active'); }

        function randomSelect() {
            selectedItems=[]; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
            [...ALL_PRESETS].sort(()=>.5-Math.random()).slice(0,20).forEach(n=>{
                const isT = STRUCTURED_DATA.find(m=>m.taggable && m.middles.some(mid=>mid.items.includes(n)));
                selectedItems.push({name:n, color:COLORS.pink, level:0, note:'', side:'', isTaggable:!!isT});
                document.getElementById('chip-'+n)?.classList.add('selected');
            });
            renderBottles(); saveState();
        }

        function generatePreview() {
            const p = document.getElementById('previewContainer'); p.innerHTML='';
            selectedItems.forEach(b => {
                const card = document.createElement('div'); card.className='preview-bottle-card';
                card.innerHTML=`<div style="font-size:0.75rem;font-weight:bold;height:3em;">${b.side?'#'+b.side+'<br>':''}${b.name}</div><div class="bottle-frame" style="width:45px;height:70px;"><div class="liquid" style="height:${b.level}%;background:${b.color};opacity:0.8;"></div></div><div style="font-size:0.65rem;">${b.level}%</div>`;
                p.appendChild(card);
            });
            document.getElementById('previewArea').style.display='flex';
        }
        window.onload = init;
    </script>
</body>
</html>
